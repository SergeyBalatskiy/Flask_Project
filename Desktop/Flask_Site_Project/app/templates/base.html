<!DOCTYPE html>
<html lang="ru">

<head>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Моё резюме{% endblock %}</title>

    {% block extra_css %}{% endblock %}
</head>

<body class="{% block body_class %}{% endblock %}">
    <!-- Шапка сайта -->
    <header class="container">
        <span class="logo">sport</span>
        <nav>
            <ul>

                {% if current_user.is_authenticated %}
                <a href="{{ url_for('profile.profile_of_user') }}" class="btn btn-info">Профиль</a>
                <li class="active"><a href="{{ url_for('main_page.example_profile') }}">Пример анкеты</li>
                <li class="active"><a href="{{ url_for('de_auth.deauth') }}">Выйти</li>
                <li class="btn"><a href="{{ url_for('about_site.about_site') }}">О сайте</li>

                {% else %}
                <!--<li class="active"><a href="{{url_for('main_page.example_profile')}}">Создание анкеты</li>-->
                <li class="active"><a href="{{url_for('registration.registration')}}">Регистрация</li>
                <li class="active"><a href="{{ url_for('main_page.example_profile') }}">Пример анкеты</li>
                <li class="active"><a href="{{url_for('authenitication.auth')}}">Войти</li>
                <li class="btn"><a href="{{ url_for('about_site.about_site') }}">О сайте</li>
                {% endif %}

            </ul>
        </nav>

    </header>


    <main class="container">
        {% block body %}

        <!-- Основной контент -->

        {% endblock %}
    </main>

</body>

</html>
