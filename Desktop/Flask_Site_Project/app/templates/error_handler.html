{% extends "base.html" %}

{% block body %}

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Страница не найдена</title>
    
</head>
<body>
    <div class="error-container">
        <div class="error-code">404</div>
        <div class="error-message">По вашему запросу ничего не найдено!</div>
        <div class="error-description">
            Возможно, страница была удалена, перемещена или вы указали неверный адрес.
        </div>
        <a href="/" class="home-button">Вернуться на главную</a>
    </div>
</body>
</html>

{% endblock %}
