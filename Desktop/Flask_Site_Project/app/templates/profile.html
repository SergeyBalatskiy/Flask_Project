{% extends "base.html" %}

{% block body %}
{% for msg in get_flashed_messages() %}
<div>{{msg}}</div>
{% endfor %}

<div class="profile-ava"><img src="{{url_for('profile.show_avatar')}}"></div>

<form action="{{url_for('profile.upload_avatar')}}" method="POST" enctype="multipart/form-data">
    <p><input type="file" name="file">
    <p><input type="submit" value="Загрузить новый аватар">
</form>

<h1>Ваш аккаунт с данными:</h1>
<h2>{{current_user.name}}</h2>
<h2>{{current_user.surname}}</h2>
<h2>{{current_user.mail}}</h2>
<h2>{{current_user.phone}}</h2>
<h2>{{current_user.date}}</h2>

<a href='{{url_for("de_auth.deauth") }}' class="btn btn-danger">Выйти</a>

{% endblock %}
